services:
  # MongoDB
  mongodb:
    image: mongo:7.0
    container_name: obras_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongodb:/data/db
    environment:
      MONGO_INITDB_DATABASE: obras_db
    networks:
      - obras_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: obras_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - obras_network

  # Backend (Node.js + Express)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: obras_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - DATABASE_NAME=obras_db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-secret-key-change-in-production
      - JWT_EXPIRES_IN=30m
      - LOGIN_ATTEMPTS_LIMIT=5
      - LOGIN_BLOCK_DURATION_MINUTES=15
      - PORT=8000
      - NODE_ENV=production
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://localhost:5173
    depends_on:
      - mongodb
      - redis
    networks:
      - obras_network

  # Frontend (React + Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: obras_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - obras_network

networks:
  obras_network:
    driver: bridge

# Local data directories will be created automatically
