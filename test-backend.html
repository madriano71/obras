<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Backend - Obras</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }

        .result {
            background: #f5f5f5;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            white-space: pre-wrap;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }

        button:hover {
            background: #2563eb;
        }

        .error {
            background: #fee;
            color: #c00;
        }

        .success {
            background: #efe;
            color: #060;
        }
    </style>
</head>

<body>
    <h1>🔧 Teste de Conexão Backend</h1>

    <div>
        <button onclick="testHealth()">1. Testar Health Check</button>
        <button onclick="testLogin()">2. Testar Login</button>
        <button onclick="testMe()">3. Testar /me (após login)</button>
    </div>

    <div id="results"></div>

    <script>
        const API_URL = 'http://localhost:8000/api';
        let token = null;

        function addResult(title, data, isError = false) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = 'result ' + (isError ? 'error' : 'success');
            div.innerHTML = `<strong>${title}</strong>\n${JSON.stringify(data, null, 2)}`;
            results.appendChild(div);
        }

        async function testHealth() {
            try {
                const response = await fetch('http://localhost:8000/health');
                const data = await response.json();
                addResult('✅ Health Check', data);
            } catch (error) {
                addResult('❌ Health Check Error', { error: error.message }, true);
            }
        }

        async function testLogin() {
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'admin@admin.com',
                        password: 'admin123'
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    token = data.access_token;
                    addResult('✅ Login Sucesso', data);
                } else {
                    addResult('❌ Login Falhou', data, true);
                }
            } catch (error) {
                addResult('❌ Login Error', { error: error.message }, true);
            }
        }

        async function testMe() {
            if (!token) {
                addResult('❌ Token não encontrado', { message: 'Faça login primeiro' }, true);
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    addResult('✅ Dados do Usuário', data);
                } else {
                    addResult('❌ Erro ao buscar usuário', data, true);
                }
            } catch (error) {
                addResult('❌ /me Error', { error: error.message }, true);
            }
        }
    </script>
</body>

</html>
